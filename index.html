<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Word Ladder Daily</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .puzzle-box {
      margin: 20px 0;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 18px;
    }

    .word {
      font-size: 28px;
      font-weight: bold;
      margin: 10px 0;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    #output {
      margin-top: 20px;
      white-space: pre-line;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>Word Ladder Daily</h1>

  <div class="puzzle-box">
    <div>Start Word</div>
    <div class="word" id="startWord">...</div>

    <div>End Word</div>
    <div class="word" id="endWord">...</div>
  </div>

  <button onclick="solve()">Show Solution</button>

  <div id="output"></div>

  <script src="script.js"></script>

</body>
</html>
