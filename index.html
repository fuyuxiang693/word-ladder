<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Word Ladder</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="app">

  <h2>WORD LADDER</h2>
  <div id="description">
    Change the <b>start word</b> into the <b>end word</b> one letter at a time.<br>
    Each step must be a valid word.<br>
    You can add, remove, or change <b>one letter per move</b>.
  </div>

  <div id="ladder"></div>

  <div id="actions">
    <span onclick="undo()" id="undoBtn">UNDO</span>
    <span onclick="showSolution()" id="solveBtn">SHOW SOLUTION</span>
  </div>

  <div id="keyboard"></div>

</div>

<script src="script.js"></script>

</body>
</html>
